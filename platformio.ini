; ============================================================================
;  PlatformIO-Projektdatei fuer den BOSS-925 Alarm-Waechter (ESP32)
;  ----------------------------------------------------------------------------
;  Bauen/Flashen per CLI:
;     pio run                 -> kompilieren
;     pio run -t upload       -> auf den ESP32 flashen
;     pio device monitor      -> serielle Ausgabe ansehen (115200 Baud)
;
;  src_dir zeigt auf den Sketch-Ordner, dessen Name exakt der .ino entspricht,
;  damit das Projekt ZUSAETZLICH direkt in der Arduino IDE geoeffnet werden kann.
; ============================================================================
[platformio]
src_dir = boss925_alarm_bark

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework  = arduino
monitor_speed = 115200
upload_speed  = 921600

; Keine externen Libraries noetig - alles steckt im ESP32-Arduino-Core
; (WiFi, HTTPClient, WiFiClientSecure, time.h, esp_task_wdt).
lib_deps =
